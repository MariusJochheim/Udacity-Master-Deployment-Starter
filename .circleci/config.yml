version: 2.1
orbs:
  # orbs contain basic recipes and reproducible actions (install node, aws, etc.)
  node: circleci/node@5.0.2
  eb: circleci/aws-elastic-beanstalk@2.0.1
  aws-cli: circleci/aws-cli@3.1.1
  # different jobs are called later in the workflows sections

jobs:
  build:
    docker:
      # the base image can run most needed actions with orbs
      - image: "cimg/node:14.15"
    steps:
      # install node and checkout code
      - node/install:
          node-version: '14.15'         
      - checkout
      
      # Use root level package.json to install dependencies in the frontend app
      - run:
          name: Install Front-End Dependencies
          command: |
            echo "NODE --version" 
            echo $(node --version)
            echo "NPM --version" 
            echo $(npm --version)
            npm run frontend:install
      
      # Install dependencies in the backend API          
      - run:
          name: Install API Dependencies
          command: npm run api:install
      
      # Lint the frontend
      - run:
          name: Front-End Lint
          command: npm run frontend:lint
      
      # Build the frontend app
      - run:
          name: Front-End Build
          command: npm run frontend:build
      
      # Build the backend API      
      - run:
          name: API Build
          command: npm run api:build
      
      # Save build artifacts for deploy step
      - persist_to_workspace:
          root: .
          paths:
            - udagram/udagram-api/www
            - udagram/udagram-frontend/www

  # deploy step will run only after manual approval
  deploy:
    docker:
      - image: "cimg/base:stable"
      # more setup needed for aws, node, elastic beanstalk
    steps:
      - node/install:
          node-version: '14.15' 
      - eb/setup
      - aws-cli/setup
      - checkout
      - attach_workspace:
          at: .

      - run:
          name: Verify Required Deployment Environment Variables
          command: |
            required_vars=(
              AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY
              AWS_REGION
              AWS_BUCKET
              POSTGRES_HOST
              POSTGRES_DB
              POSTGRES_USERNAME
              POSTGRES_PASSWORD
              JWT_SECRET
              URL
            )

            for var_name in "${required_vars[@]}"; do
              if [ -z "${!var_name}" ]; then
                echo "Missing required CircleCI environment variable: ${var_name}"
                exit 1
              fi
            done
      
      - run:
          name: Configure and Deploy API to ElasticBeanstalk
          command: |
            cd udagram/udagram-api
            eb use Mj-udacity-udagram-api-env
            eb setenv \
              POSTGRES_USERNAME="$POSTGRES_USERNAME" \
              POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              POSTGRES_HOST="$POSTGRES_HOST" \
              POSTGRES_DB="$POSTGRES_DB" \
              JWT_SECRET="$JWT_SECRET" \
              AWS_BUCKET="$AWS_BUCKET" \
              AWS_REGION="$AWS_REGION" \
              AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              URL="$URL"
            npm run deploy
            cd ../..
      
      - run:
          name: Deploy Frontend to S3
          command: |
            aws s3 sync udagram/udagram-frontend/www s3://$AWS_BUCKET --delete --acl public-read --region "$AWS_REGION"
            aws s3 website s3://$AWS_BUCKET --index-document index.html --error-document index.html --region "$AWS_REGION"
            echo "Frontend deployed to: https://$AWS_BUCKET.s3-website-$AWS_REGION.amazonaws.com/index.html"
            
workflows:
  udagram:
    jobs:
      - build
      - hold:
          filters:
            branches:
              only:
                - master
                - main
          type: approval
          requires:
            - build
      - deploy:
          requires:
            - hold
